<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="pro.jpg">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7301759064661296"
     crossorigin="anonymous"></script>
<title>Random Test</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.start-screen {
  text-align: center;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #ff9800;
  color: white;
  cursor: pointer;
}

.quiz-box {
  display: none;
  width: 400px;
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.answers button {
  display: block;
  width: 100%;
  margin: 8px 0;
}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <h1>Random Test</h1>
  <p>Aralash savollar!</p>
  <button onclick="startQuiz()">Boshlash</button>
</div>

<div class="quiz-box" id="quizBox">
  <h2 id="question"></h2>
  <div class="answers">
    <button onclick="checkAnswer(0)"></button>
    <button onclick="checkAnswer(1)"></button>
    <button onclick="checkAnswer(2)"></button>
    <button onclick="checkAnswer(3)"></button>
  </div>
  <p id="result"></p>
</div>

<script>
// Barcha savollar (mix)
let allQuestions = [

/* MATEMATIK */
{question:"2+2=?",answers:["3","4","5","6"],correct:1},
{question:"√144=?",answers:["10","12","14","16"],correct:1},
{question:"5*6=?",answers:["25","30","35","40"],correct:1},

/* GEOGRAFIK */
{question:"Eng katta okean?",answers:["Atlantika","Hind","Tinch","Arktika"],correct:2},
{question:"O‘zbekiston poytaxti?",answers:["Toshkent","Buxoro","Xiva","Samarqand"],correct:0},
{question:"Eng uzun daryo?",answers:["Nil","Amazonka","Volga","Ganga"],correct:1},

/* TABIAT */
{question:"Eng katta hayvon?",answers:["Fil","Kit","Sher","Ot"],correct:1},
{question:"Suv formulasi?",answers:["CO2","H2O","O2","NaCl"],correct:1},
{question:"Qaysi gaz nafas olish uchun kerak?",answers:["CO2","O2","N2","H2"],correct:1},

/* YANA ARALASH */
{question:"10 ning 50%=?",answers:["5","10","15","20"],correct:0},
{question:"Qaysi davlat Afrikada?",answers:["Misr","Fransiya","Xitoy","Kanada"],correct:0},
{question:"Qaysi hayvon uchadi?",answers:["It","Qush","Sigir","Ot"],correct:1}

];

// RANDOM qilish
allQuestions.sort(() => Math.random() - 0.5);

// faqat 10 ta savol tanlaymiz
const questions = allQuestions.slice(0, 10);

let current = 0;
let score = 0;

function startQuiz() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("quizBox").style.display = "block";
  loadQuestion();
}

function loadQuestion() {
  const q = questions[current];
  document.getElementById("question").innerText = q.question;

  const buttons = document.querySelectorAll(".answers button");
  buttons.forEach((btn, i) => {
    btn.innerText = q.answers[i];
  });
}

function checkAnswer(index) {
  if(index === questions[current].correct){
    score++;
    document.getElementById("result").innerText = "To‘g‘ri ✅";
  } else {
    document.getElementById("result").innerText = "Noto‘g‘ri ❌";
  }

  current++;

  setTimeout(()=>{
    if(current < questions.length){
      loadQuestion();
      document.getElementById("result").innerText="";
    } else {
      document.getElementById("quizBox").innerHTML =
      `<h2>Natija: ${score} / ${questions.length}</h2>
       <button onclick="location.reload()">Qayta boshlash</button>`;
    }
  },1000);
}
</script>

</body>
</html>
