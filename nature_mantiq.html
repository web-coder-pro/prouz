<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="pro.jpg">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7301759064661296"
     crossorigin="anonymous"></script>
<title>Tabiat Test</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #134e5e, #71b280);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.start-screen {
  text-align: center;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #4caf50;
  color: white;
  cursor: pointer;
}

.quiz-box {
  display: none;
  width: 400px;
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.answers button {
  display: block;
  width: 100%;
  margin: 8px 0;
}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <h1>Tabiat Test</h1>
  <p>Bilimingni sinab ko‘r!</p>
  <button onclick="startQuiz()">Boshlash</button>
</div>

<div class="quiz-box" id="quizBox">
  <h2 id="question"></h2>
  <div class="answers">
    <button onclick="checkAnswer(0)"></button>
    <button onclick="checkAnswer(1)"></button>
    <button onclick="checkAnswer(2)"></button>
    <button onclick="checkAnswer(3)"></button>
  </div>
  <p id="result"></p>
</div>

<script>
const questions = [
{question:"O‘simliklar nima orqali oziqlanadi?",answers:["Fotosintez","Nafas olish","Ovqat yeyish","Suv ichish"],correct:0},
{question:"Eng katta hayvon?",answers:["Fil","Kit","Sher","Delfin"],correct:1},
{question:"Odam tanasida nechta yurak bor?",answers:["1","2","3","4"],correct:0},
{question:"Qaysi gaz nafas olish uchun kerak?",answers:["CO2","O2","N2","H2"],correct:1},
{question:"Qaysi hayvon uchadi?",answers:["Sher","Qush","Ilon","Sigir"],correct:1},
{question:"Daraxtlar nima chiqaradi?",answers:["CO2","O2","N2","CH4"],correct:1},
{question:"Eng tez yuguruvchi hayvon?",answers:["Sher","Gepard","Ot","Bo‘ri"],correct:1},
{question:"Qaysi organ qon pompalaydi?",answers:["O‘pka","Yurak","Miya","Jigar"],correct:1},
{question:"Qaysi hayvon suvda yashaydi?",answers:["Mushuk","Baliq","It","Sigir"],correct:1},
{question:"Yerning asosiy energiya manbai?",answers:["Oy","Quyosh","Yulduz","Bulut"],correct:1},
{question:"Qaysi o‘simlik daraxt?",answers:["Gul","Olma","Maysa","Bug‘doy"],correct:1},
{question:"Qaysi hayvon o‘txo‘r?",answers:["Sher","Sigir","Bo‘ri","Yo‘lbars"],correct:1},
{question:"Odam nechta o‘pka bilan tug‘iladi?",answers:["1","2","3","4"],correct:1},
{question:"Qaysi hayvon sudralib yuradi?",answers:["Ilon","Qush","Ot","Baliq"],correct:0},
{question:"Qaysi organ fikrlaydi?",answers:["Yurak","Miya","Jigar","Oyoq"],correct:1},
{question:"Qaysi hayvon yirtqich?",answers:["Sigir","Qo‘y","Sher","Ot"],correct:2},
{question:"Suv formulasi?",answers:["H2O","CO2","O2","NaCl"],correct:0},
{question:"Qaysi hayvon uchmaydi?",answers:["Qush","Burgut","Pingvin","Kabutar"],correct:2},
{question:"O‘simliklar nimaga muhtoj?",answers:["Quyosh","Telefon","Kompyuter","Elektr"],correct:0},
{question:"Qaysi hayvon sut beradi?",answers:["Sigir","Baliq","Qush","Ilon"],correct:0}
];

let current = 0;
let score = 0;

function startQuiz() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("quizBox").style.display = "block";
  loadQuestion();
}

function loadQuestion() {
  const q = questions[current];
  document.getElementById("question").innerText = q.question;

  const buttons = document.querySelectorAll(".answers button");
  buttons.forEach((btn, i) => {
    btn.innerText = q.answers[i];
  });
}

function checkAnswer(index) {
  if(index === questions[current].correct){
    score++;
    document.getElementById("result").innerText = "To‘g‘ri ✅";
  } else {
    document.getElementById("result").innerText = "Noto‘g‘ri ❌";
  }

  current++;

  setTimeout(()=>{
    if(current < questions.length){
      loadQuestion();
      document.getElementById("result").innerText="";
    } else {
      document.getElementById("quizBox").innerHTML =
      `<h2>Natija: ${score} / ${questions.length}</h2>
       <button onclick="location.reload()">Qayta boshlash</button>`;
    }
  },1000);
}
</script>

</body>
</html>
