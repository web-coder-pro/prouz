<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="pro.jpg">
<title>Math Logic Test</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #000428, #004e92);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.start-screen {
  text-align: center;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #00c6ff;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.quiz-box {
  display: none;
  width: 400px;
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.answers button {
  display: block;
  width: 100%;
  margin: 8px 0;
}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <h1>Matematik Mantiqiy Test</h1>
  <button onclick="startQuiz()">Boshlash</button>
</div>

<div class="quiz-box" id="quizBox">
  <h2 id="question"></h2>
  <div class="answers">
    <button onclick="checkAnswer(0)"></button>
    <button onclick="checkAnswer(1)"></button>
    <button onclick="checkAnswer(2)"></button>
    <button onclick="checkAnswer(3)"></button>
  </div>
  <p id="result"></p>
</div>

<script>
const questions = [
{question:"2, 6, 7, 21, 23, ?",answers:["46","69","48","50"],correct:1},
{question:"3^2 + 4^2 = ?",answers:["12","25","7","20"],correct:1},
{question:"1, 1, 2, 3, 5, 8, ?",answers:["11","13","12","15"],correct:1},
{question:"5x = 45, x = ?",answers:["5","9","8","10"],correct:1},
{question:"12 + 15 * 2 = ?",answers:["54","42","30","60"],correct:1},
{question:"Qaysi son tub? ",answers:["21","27","29","35"],correct:2},
{question:"(8+2)*3 = ?",answers:["30","24","20","36"],correct:0},
{question:"7, 14, 28, ?, 112",answers:["54","56","60","58"],correct:1},
{question:"100/4 + 5 = ?",answers:["25","30","35","20"],correct:1},
{question:"2^5 = ?",answers:["32","16","25","64"],correct:0},
{question:"9, 18, 27, ?, 45",answers:["36","34","35","38"],correct:0},
{question:"(15-5)*2 = ?",answers:["10","20","30","25"],correct:1},
{question:"6!, natija?",answers:["720","120","360","600"],correct:0},
{question:"1/2 + 1/4 = ?",answers:["3/4","2/6","1/3","1/2"],correct:0},
{question:"10 ning 20% = ?",answers:["2","5","10","20"],correct:0},
{question:"3, 9, 27, ?, 243",answers:["54","81","72","90"],correct:1},
{question:"√144 = ?",answers:["10","11","12","13"],correct:2},
{question:"(2+3)^2 = ?",answers:["10","25","20","15"],correct:1},
{question:"50 - (5*6) = ?",answers:["20","30","25","35"],correct:0},
{question:"Agar x+3=10 bo‘lsa x=?",answers:["5","6","7","8"],correct:2}
];

let current = 0;
let score = 0;

function startQuiz() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("quizBox").style.display = "block";
  loadQuestion();
}

function loadQuestion() {
  const q = questions[current];
  document.getElementById("question").innerText = q.question;

  const buttons = document.querySelectorAll(".answers button");
  buttons.forEach((btn, i) => {
    btn.innerText = q.answers[i];
  });
}

function checkAnswer(index) {
  if(index === questions[current].correct){
    score++;
    document.getElementById("result").innerText = "To‘g‘ri ✅";
  } else {
    document.getElementById("result").innerText = "Noto‘g‘ri ❌";
  }

  current++;

  setTimeout(()=>{
    if(current < questions.length){
      loadQuestion();
      document.getElementById("result").innerText="";
    } else {
      document.getElementById("quizBox").innerHTML =
      `<h2>Natija: ${score} / ${questions.length}</h2>
       <button onclick="location.reload()">Qayta boshlash</button>`;
    }
  },1000);
}
</script>

</body>
</html>
